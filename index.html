<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NYC · Mars 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap');

  :root {
    --bg: #F4F3F1;
    --bg2: #ECEAE6;
    --white: #FFFFFF;
    --text: #1A1917;
    --text-muted: #9B9690;
    --text-soft: #6B6860;
    --border: #E2E0DC;
    --border-soft: #EDEBE8;

    /* Accents pastel */
    --lavender: #C8C2F0;
    --lavender-bg: #F0EEF9;
    --yellow: #F0D97A;
    --yellow-bg: #FDFAEC;
    --mint: #A8D8B0;
    --mint-bg: #EFF8F1;
    --peach: #F5C4A8;
    --peach-bg: #FEF3EC;
    --sky: #A8CCE8;
    --sky-bg: #EBF4FB;
    --rose: #F0A8B8;
    --rose-bg: #FEF0F3;
    --sage: #B8D4B8;
    --sage-bg: #F0F6F0;

    --accent: #7B6EE8;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-emoji {
    width: 36px; height: 36px;
    background: var(--lavender-bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text { display: flex; flex-direction: column; line-height: 1.2; }

  .logo-main {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .header-right {
    display: flex; flex-direction: column; align-items: flex-end;
  }

  .trip-dates .dates {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .trip-dates .count {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 6px;
  }

  .tab {
    flex: 1;
    padding: 12px 8px 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0;
    font-family: 'Montserrat', sans-serif;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* VIEWS */
  .view { display: none; flex: 1; overflow: hidden; }
  .view.active { display: flex; flex-direction: column; }

  /* MAP VIEW */
  #map { flex: 1; z-index: 1; }

  /* Custom marker */
  .custom-pin {
    width: 34px; height: 34px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid rgba(255,255,255,0.9);
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  }
  .custom-pin .pin-icon { transform: rotate(45deg); font-size: 14px; }

  /* CATEGORY COLORS — pastel */
  .cat-monument { background: #C8C2F0; }
  .cat-musee    { background: #A8CCE8; }
  .cat-quartier { background: #A8D8B0; }
  .cat-parc     { background: #B8D4B8; }
  .cat-building { background: #F0D97A; }
  .cat-shopping { background: #F5C4A8; }
  .cat-resto    { background: #F0A8B8; }
  .cat-eglise   { background: #D4C4A8; }
  .cat-hotel    { background: #F0A8CC; }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--white) !important;
    border: 1px solid var(--border) !important;
    border-radius: 16px !important;
    box-shadow: var(--shadow-lg) !important;
    padding: 0 !important;
    overflow: hidden;
  }
  .leaflet-popup-content { margin: 0 !important; width: 270px !important; }
  .leaflet-popup-tip { background: var(--white) !important; }

  .popup-content { padding: 16px; }

  .popup-cat-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 20px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .popup-title {
    font-family: 'Fraunces', serif;
    font-size: 17px; font-weight: 600;
    color: var(--text); line-height: 1.2; margin-bottom: 4px;
  }

  .popup-address { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }

  .popup-info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; margin-bottom: 10px;
  }

  .popup-info-item {
    background: var(--bg); border-radius: 8px; padding: 8px 10px;
  }

  .popup-info-label {
    font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 3px; font-weight: 600;
  }

  .popup-info-value { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }

  .popup-history {
    font-size: 12px; color: var(--text-soft); line-height: 1.5;
    border-top: 1px solid var(--border); padding-top: 10px;
  }

  .popup-links {
    display: flex; gap: 6px;
    margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;
  }

  .popup-link {
    flex: 1; padding: 8px; border-radius: 10px;
    text-align: center; font-size: 11px; font-weight: 600;
    text-decoration: none; transition: opacity 0.2s; color: var(--text);
  }
  .popup-link:hover { opacity: 0.75; }
  .popup-link.primary { background: var(--lavender); }
  .popup-link.secondary { background: var(--bg2); }

  /* LIST VIEW */
  #list-view { overflow-y: auto; }

  .list-filters {
    padding: 12px 16px; display: flex; gap: 6px;
    overflow-x: auto; border-bottom: 1px solid var(--border);
    flex-shrink: 0; -webkit-overflow-scrolling: touch;
    background: var(--white);
  }
  .list-filters::-webkit-scrollbar { display: none; }

  .filter-pill {
    white-space: nowrap; padding: 6px 13px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border);
    color: var(--text-muted); background: var(--white);
    transition: all 0.18s; flex-shrink: 0;
  }
  .filter-pill.active {
    background: var(--lavender-bg); color: var(--accent);
    border-color: var(--lavender);  font-weight: 600;
  }

  .list-scroll {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    -webkit-overflow-scrolling: touch;
  }

  .place-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.18s;
    display: flex; gap: 12px; align-items: flex-start;
    box-shadow: var(--shadow);
  }
  .place-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

  .place-card-icon {
    width: 42px; height: 42px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }

  .place-card-body { flex: 1; min-width: 0; }

  .place-card-cat {
    font-size: 10px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.3px;
  }

  .place-card-name {
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600;
    color: var(--text); white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; margin-bottom: 5px;
  }

  .place-card-meta {
    display: flex; gap: 8px; font-size: 11px; color: var(--text-muted);
    flex-wrap: wrap;
  }

  .place-card-meta span {
    display: flex; align-items: center; gap: 3px;
    background: var(--bg); padding: 2px 7px; border-radius: 6px;
  }

  /* DETAIL MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(26,25,23,0.4); backdrop-filter: blur(6px);
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 88dvh; overflow-y: auto;
    padding: 6px 20px 40px; animation: slideUp 0.28s ease;
    box-shadow: 0 -4px 40px rgba(0,0,0,0.12);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 10px auto 14px;
  }

  .modal-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    margin-bottom: 10px; color: var(--text);
  }

  .modal-title {
    font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600;
    line-height: 1.15; margin-bottom: 6px; color: var(--text);
  }

  .modal-address {
    color: var(--text-muted); font-size: 13px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 4px;
  }

  .modal-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }

  .modal-info-card {
    background: var(--bg); border-radius: 12px; padding: 12px;
  }
  .modal-info-card.full { grid-column: 1 / -1; }

  .modal-info-label {
    font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 4px; font-weight: 600;
  }

  .modal-info-value {
    font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4;
  }

  .modal-history {
    background: var(--lavender-bg); border: 1px solid var(--lavender);
    border-radius: 14px; padding: 14px; margin-bottom: 14px;
  }

  .modal-history-title {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--accent); font-weight: 700;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }

  .modal-history-text {
    font-size: 13px; color: var(--text-soft); line-height: 1.6;
  }

  .modal-tips { margin-bottom: 16px; }

  .modal-tip {
    display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px;
    background: var(--bg); border-radius: 10px; padding: 10px 12px;
  }

  .modal-tip-icon { font-size: 15px; flex-shrink: 0; }
  .modal-tip-text { font-size: 13px; color: var(--text-soft); line-height: 1.5; }

  .modal-actions { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1; padding: 14px; border-radius: 14px;
    text-align: center; font-size: 12px; font-weight: 700;
    text-decoration: none; letter-spacing: 0.3px;
    border: none; cursor: pointer; transition: opacity 0.2s;
    color: var(--text);
  }
  .modal-btn:hover { opacity: 0.8; }
  .modal-btn.primary { background: var(--lavender); }
  .modal-btn.secondary { background: var(--bg2); }
  .modal-btn.close-btn { flex: none; width: 50px; background: var(--bg2); }

  /* Leaflet overrides */
  .leaflet-container { background: #e8eef2; }

  /* MAP VIEW */
  #map-view { position: relative; }

  .map-filter-bar {
    position: absolute;
    top: 12px; left: 0; right: 0;
    z-index: 500;
    display: flex;
    gap: 6px;
    padding: 0 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    pointer-events: all;
  }
  .map-filter-bar::-webkit-scrollbar { display: none; }

  .map-filter-pill {
    white-space: nowrap;
    padding: 7px 13px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Montserrat', sans-serif;
    cursor: pointer;
    border: none;
    color: #555;
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.13);
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .map-filter-pill.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 3px 12px rgba(123,110,232,0.4);
  }

  /* PROGRAMME */
  .prog-scroll {
    flex: 1; overflow-y: auto; padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  .prog-day { margin-bottom: 22px; }

  .prog-day-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }

  .prog-day-number {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text-muted); text-transform: uppercase; white-space: nowrap;
  }

  .prog-day-date {
    font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600;
    color: var(--text); line-height: 1;
  }

  .prog-day-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--lavender); flex-shrink: 0;
  }
  .prog-day-dot.special { background: var(--mint); }

  .prog-day-line { flex: 1; height: 1px; background: var(--border); }

  .prog-day-badge {
    font-size: 10px; letter-spacing: 0.3px;
    font-weight: 600; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap; color: var(--text);
  }

  .prog-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow);
  }

  .prog-event {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .prog-event:last-child { border-bottom: none; }

  .prog-event-time {
    width: 68px; flex-shrink: 0; padding: 12px 10px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    border-right: 1px solid var(--border-soft); gap: 2px;
  }

  .prog-time-value {
    font-size: 13px; font-weight: 700;
    color: var(--accent); line-height: 1; letter-spacing: -0.2px;
  }

  .prog-time-label {
    font-size: 8px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 500; letter-spacing: 0.3px;
  }

  .prog-event-body { flex: 1; padding: 12px; }
  .prog-event-icon { font-size: 20px; margin-bottom: 4px; display: block; }

  .prog-event-name {
    font-weight: 600; font-size: 13px; color: var(--text);
    margin-bottom: 2px; line-height: 1.3;
  }

  .prog-event-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  .prog-event-tag {
    display: inline-block; margin-top: 6px;
    font-size: 9px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; color: var(--text); letter-spacing: 0.3px;
  }

  .prog-add-note {
    background: var(--yellow-bg); border: 1px dashed var(--yellow);
    border-radius: 10px; padding: 9px 14px; margin-top: 8px;
    font-size: 11px; color: var(--text-muted); text-align: center;
  }

  .flight-card {
    background: var(--sky-bg); border: 1px solid var(--sky);
    border-radius: 12px; padding: 14px;
    display: flex; align-items: center; gap: 12px;
  }

  .flight-icon { font-size: 26px; }
  .flight-info { flex: 1; }

  .flight-route {
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
    color: var(--text); line-height: 1; margin-bottom: 2px;
  }

  .flight-details { font-size: 11px; color: var(--text-muted); }
  .flight-time { text-align: right; }

  .flight-time-val {
    font-size: 22px; font-weight: 700; color: var(--text);
    letter-spacing: -0.5px; line-height: 1;
  }

  .flight-time-label {
    font-size: 9px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600;
  }

  .prog-nb-days {
    text-align: center; padding: 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-emoji">🗽</div>
    <div class="logo-text">
      <div class="logo-main">New York</div>
    </div>
  </div>
  <div class="header-right trip-dates">
    <div class="dates">9 — 18 Mars</div>
    <div class="count" id="place-count">— lieux</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('map')">🗺 Carte</div>
  <div class="tab" onclick="switchTab('list')">📋 Liste</div>
  <div class="tab" onclick="switchTab('programme')">📅 Programme</div>
</div>

<div class="view active" id="map-view">
  <div class="map-filter-bar">
    <button class="map-filter-pill active" onclick="filterMap('all', this)">Tout</button>
    <button class="map-filter-pill" onclick="filterMap('Monument', this)">🏛 Monuments</button>
    <button class="map-filter-pill" onclick="filterMap('Building', this)">🏢 Buildings</button>
    <button class="map-filter-pill" onclick="filterMap('Musée', this)">🎨 Musées</button>
    <button class="map-filter-pill" onclick="filterMap('Quartier', this)">🚶 Quartiers</button>
    <button class="map-filter-pill" onclick="filterMap('Parc', this)">🌳 Parcs</button>
    <button class="map-filter-pill" onclick="filterMap('Église', this)">⛪ Églises</button>
    <button class="map-filter-pill" onclick="filterMap('Shopping', this)">🛍 Shopping</button>
    <button class="map-filter-pill" onclick="filterMap('Restaurant', this)">🍕 Restos</button>
    <button class="map-filter-pill" onclick="filterMap('Hôtel', this)">🏠 Hôtel</button>
  </div>
  <div id="map"></div>
</div>

<div class="view" id="list-view">
  <div class="list-filters">
    <button class="filter-pill active" onclick="filterList('all', this)">Tout</button>
    <button class="filter-pill" onclick="filterList('Monument', this)">🏛 Monuments</button>
    <button class="filter-pill" onclick="filterList('Building', this)">🏢 Buildings</button>
    <button class="filter-pill" onclick="filterList('Musée', this)">🎨 Musées</button>
    <button class="filter-pill" onclick="filterList('Quartier', this)">🚶 Quartiers</button>
    <button class="filter-pill" onclick="filterList('Parc', this)">🌳 Parcs</button>
    <button class="filter-pill" onclick="filterList('Église', this)">⛪ Églises</button>
    <button class="filter-pill" onclick="filterList('Shopping', this)">🛍 Shopping</button>
    <button class="filter-pill" onclick="filterList('Restaurant', this)">🍕 Restos</button>
  </div>
  <div class="list-scroll" id="list-scroll"></div>
</div>

<!-- PROGRAMME VIEW -->
<div class="view" id="programme-view">
  <div class="prog-scroll" id="prog-scroll"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-content">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const places = [
  // MONUMENTS
  {
    name: "Empire State Building",
    cat: "Monument",
    icon: "🏙",
    emoji: "🗼",
    lat: 40.7484, lng: -73.9857,
    address: "20 W 34th St, New York, NY 10001",
    hours: "10h–23h (dernier accès 22h)",
    price: "✅ City Pass · (valeur ~44$ Main Deck / 79$ Top Deck)",
    website: "https://www.esbnyc.com",
    history: "Inauguré en 1931, l'Empire State Building fut pendant 40 ans le plus haut bâtiment du monde. Construit en seulement 410 jours, ce chef-d'œuvre Art Déco compte 102 étages. Il a servi de décor à King Kong (1933) et reste le symbole absolu de New York.",
    tips: ["Réserver en ligne pour éviter les files", "Le coucher de soleil (vers 18h en mars) est magique depuis l'observatoire", "L'éclairage nocturne change selon les événements"]
  },
  {
    name: "9/11 Memorial Museum",
    cat: "Musée",
    icon: "🕊",
    lat: 40.7115, lng: -74.0134,
    address: "180 Greenwich St, New York, NY 10007",
    hours: "9h–21h (dernière entrée 20h)",

// Add markers
places.forEach((place, i) => {

  const icon = L.divIcon({
    className: '',
    html: `<div class="custom-pin ${catClasses[place.cat] || 'cat-monument'}" style="background:${color}"><span class="pin-icon">${place.icon}</span></div>`,

      <div class="popup-title">${place.name}</div>

        </div>
        <div class="popup-info-item">

          <div class="popup-info-value">${place.price}</div>
        </div>
      </div>
      <div class="popup-history">${place.history.substring(0, 120)}...</div>
      <div class="popup-links">
        <a class="popup-link primary" href="#" onclick="openModal(${i}); return false;">Voir tout</a>
        <a class="popup-link secondary" href="${place.website}" target="_blank">Site web</a>
      </div>
    </div>
  `, { maxWidth: 300 });

  allMarkers.push({ marker, cat: place.cat });
});

// LIST VIEW
function renderList(filter) {
  const scroll = document.getElementById('list-scroll');
  const filtered = filter === 'all' ? places : places.filter(p => p.cat === filter);
  scroll.innerHTML = filtered.map((p, i) => {
    const realI = places.indexOf(p);
    const color = catColors[p.cat] || '#c9a84c';
    return `
      <div class="place-card" onclick="openModal(${realI})">
        <div class="place-card-icon" style="background:${color}20; color:${color}">
          ${p.icon}
        </div>
        <div class="place-card-body">
          <div class="place-card-cat">${p.cat}</div>
          <div class="place-card-name">${p.name}</div>
          <div class="place-card-meta">
            <span>🕐 ${p.hours.split('(')[0].trim()}</span>
            <span>💰 ${p.price.length > 25 ? p.price.substring(0,25)+'...' : p.price}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

renderList('all');

function filterList(cat, btn) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderList(cat);
}

// MODAL
function openModal(i) {
  const p = places[i];
  const color = catColors[p.cat] || '#c9a84c';
  const tipsHtml = p.tips.map(t => `
    <div class="modal-tip">
      <span class="modal-tip-icon">💡</span>
      <span class="modal-tip-text">${t}</span>
    </div>
  `).join('');

  document.getElementById('modal-body').innerHTML = `
    <span class="modal-badge" style="background:${color}">${p.cat}</span>
    <div class="modal-title">${p.name}</div>
    <div class="modal-address">📍 ${p.address}</div>
    <div class="modal-grid">
      <div class="modal-info-card">
        <div class="modal-info-label">Horaires</div>
        <div class="modal-info-value">${p.hours}</div>
      </div>
      <div class="modal-info-card">
        <div class="modal-info-label">Tarifs</div>
        <div class="modal-info-value">${p.price}</div>
      </div>
    </div>
    <div class="modal-history">
      <div class="modal-history-title">📖 Histoire & contexte</div>
      <div class="modal-history-text">${p.history}</div>
    </div>
    <div class="modal-tips">${tipsHtml}</div>
    <div class="modal-actions">
      <a class="modal-btn primary" href="${p.website}" target="_blank">Site officiel</a>
      <a class="modal-btn secondary" href="https://maps.google.com/?q=${encodeURIComponent(p.address)}" target="_blank">Google Maps</a>
      <button class="modal-btn close-btn" onclick="closeModal()">✕</button>
    </div>
  `;

  document.getElementById('modal').classList.add('open');

  // Also center map on this place
  map.setView([p.lat, p.lng], 15);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// TAB SWITCHING
// MAP FILTER
function filterMap(cat, btn) {
  document.querySelectorAll('.map-filter-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  allMarkers.forEach(({ marker, cat: mcat }) => {
    if (cat === 'all' || mcat === cat) {
      if (!map.hasLayer(marker)) map.addLayer(marker);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + '-view').classList.add('active');

  if (tab === 'map') {
    setTimeout(() => map.invalidateSize(), 100);
  }
  if (tab === 'programme') {
    renderProgramme();
  }
}

function renderProgramme() {
  const scroll = document.getElementById('prog-scroll');
  const days = programme.length;
  let html = `<div class="prog-nb-days">✈ VOYAGE DE ${days} JOURS — 9 AU 18 MARS 2025</div>`;

  programme.forEach(day => {
    html += `<div class="prog-day">
      <div class="prog-day-header">
        <div class="prog-day-dot ${day.special ? 'special' : ''}"></div>
        <div>
          <div class="prog-day-number">${day.num} · ${day.day}</div>
          <div class="prog-day-date">${day.date}</div>
        </div>
        <div class="prog-day-line"></div>
        ${day.special ? '<span class="prog-day-badge" style="background:#A8D8B0;color:#1A1917">✦ Spécial</span>' : ''}
      </div>`;

    html += `<div class="prog-card">`;

    day.events.forEach(ev => {
      const hasFlight = ev.flight;
      html += `<div class="prog-event">
        <div class="prog-event-time">
          <div class="prog-time-value">${ev.time}</div>
          ${ev.label ? `<div class="prog-time-label">${ev.label}</div>` : ''}
        </div>
        <div class="prog-event-body">
          <span class="prog-event-icon">${ev.icon}</span>`;

      if (hasFlight) {
        html += `<div class="flight-card">
          <div class="flight-icon">${ev.icon}</div>
          <div class="flight-info">
            <div class="flight-route">${ev.flight.route}</div>
            <div class="flight-details">${ev.flight.details}</div>
          </div>
          <div class="flight-time">
            <div class="flight-time-val">${ev.flight.time}</div>
            <div class="flight-time-label">${ev.flight.timeLabel}</div>
          </div>
        </div>`;
      } else {
        html += `<div class="prog-event-name">${ev.name}</div>
          <div class="prog-event-desc">${ev.desc}</div>`;
      }

      if (ev.tag) {
        html += `<span class="prog-event-tag" style="background:${ev.tagColor};color:#1A1917">${ev.tag}</span>`;
      }

      html += `</div></div>`;
    });

    html += `</div>`;

    if (!day.special) {
      html += ``;
    }

    html += `</div>`;
  });

  scroll.innerHTML = html;
}
</script>
